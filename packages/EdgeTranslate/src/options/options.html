<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title class="i18n" data-i18n-name="SettingsTitle"></title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link type="text/css" rel="stylesheet" href="./options.css" />
    </head>

    <body>
        <div id="option">
            <header>
                <img src="../icon/icon128.png" />
                <span class="space"></span>
                <span class="space"></span>
                Edge Translate
            </header>
            <div class="content">
                <label
                    for="content-settings"
                    class="setting-title i18n"
                    data-i18n-name="ContentSettings"
                ></label>
                <!-- 默认翻译语言 + 界面语言 -->
                <div id="default-language-setting" class="row" style="margin-bottom:12px">
                    <div class="column">
                        <label for="default-target-language" class="checked-label i18n" data-i18n-name="DefaultTargetLanguage"></label>
                        <select id="default-target-language" class="api-key-input" style="margin-top:4px"></select>
                    </div>
                    <div class="column">
                        <label for="ui-language" class="checked-label i18n" data-i18n-name="UILanguage"></label>
                        <select id="ui-language" class="api-key-input" style="margin-top:4px">
                            <option value="zh_CN">简体中文</option>
                            <option value="zh_TW">繁體中文</option>
                            <option value="en">English</option>
                            <option value="ja">日本語</option>
                            <option value="ru">Русский</option>
                            <option value="fr">Français</option>
                        </select>
                    </div>
                </div>
                <div id="content-settings">
                    <div class="row">
                        <div class="column">
                            <label
                                for="source-pronunciation"
                                class="checked-label i18n"
                                data-i18n-name="SourcePronunciation"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter sPronunciation"
                                    class="checkbox"
                                    id="source-pronunciation"
                                />
                            </label>
                        </div>
                        <div class="column">
                            <label
                                for="source-pronunciation-icon"
                                class="checked-label i18n"
                                data-i18n-name="SourcePronunciationIcon"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter sPronunciationIcon"
                                    class="checkbox"
                                    id="source-pronunciation-icon"
                                />
                            </label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <label
                                for="target-pronunciation"
                                class="checked-label i18n"
                                data-i18n-name="TargetPronunciation"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter tPronunciation"
                                    class="checkbox"
                                    id="target-pronunciation"
                                />
                            </label>
                        </div>
                        <div class="column">
                            <label
                                for="target-pronunciation-icon"
                                class="checked-label i18n"
                                data-i18n-name="TargetPronunciationIcon"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter tPronunciationIcon"
                                    class="checkbox"
                                    id="target-pronunciation-icon"
                                />
                            </label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <label
                                for="original-text"
                                class="checked-label i18n"
                                data-i18n-name="OriginalText"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter originalText"
                                    class="checkbox"
                                    id="original-text"
                                />
                            </label>
                        </div>
                        <div class="column">
                            <label
                                for="detailed-meanings"
                                class="checked-label i18n"
                                data-i18n-name="DetailedMeanings"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter detailedMeanings"
                                    class="checkbox"
                                    id="detailed-meanings"
                                />
                            </label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <label
                                for="definitions"
                                class="checked-label i18n"
                                data-i18n-name="Definitions"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter definitions"
                                    class="checkbox"
                                    id="definitions"
                                />
                            </label>
                        </div>
                        <div class="column">
                            <label
                                for="examples"
                                class="checked-label i18n"
                                data-i18n-name="Examples"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter examples"
                                    class="checkbox"
                                    id="examples"
                                />
                            </label>
                        </div>
                    </div>
                </div>

                <label class="setting-title i18n" data-i18n-name="HybridTranslatorConfig"></label>
                <div class="row">
                    <div class="column">
                        <label
                            for="main-translator"
                            class="checked-label i18n"
                            data-i18n-name="MainTranslator"
                            data-insert-pos="afterBegin"
                        >
                            <select
                                id="main-translator"
                                class="translator-config"
                                data-affected="originalText mainMeaning"
                            ></select>
                        </label>
                    </div>
                    <div class="column">
                        <label
                            for="pronunciation-translator"
                            class="checked-label i18n"
                            data-i18n-name="PronunciationTranslator"
                            data-insert-pos="afterBegin"
                        >
                            <select
                                id="pronunciation-translator"
                                class="translator-config"
                                data-config-key="pronunciationSource"
                            ></select>
                        </label>
                    </div>
                </div>
                <div class="row">
                    <div class="column">
                        <label
                            for="detailed-translator"
                            class="checked-label i18n"
                            data-i18n-name="DetailedTranslator"
                            data-insert-pos="afterBegin"
                        >
                            <select
                                id="detailed-translator"
                                class="translator-config"
                                data-affected="detailedMeanings"
                            ></select>
                        </label>
                    </div>
                    <div class="column">
                        <label
                            for="definition-translator"
                            class="checked-label i18n"
                            data-i18n-name="DefinitionTranslator"
                            data-insert-pos="afterBegin"
                        >
                            <select
                                id="definition-translator"
                                class="translator-config"
                                data-affected="definitions"
                            ></select>
                        </label>
                    </div>
                </div>
                <div class="row">
                    <div class="column">
                        <label
                            for="example-translator"
                            class="checked-label i18n"
                            data-i18n-name="ExampleTranslator"
                            data-insert-pos="afterBegin"
                        >
                            <select
                                id="example-translator"
                                class="translator-config"
                                data-affected="examples"
                            ></select>
                        </label>
                    </div>
                    <div class="column">
                        <label
                            for="long-translator"
                            class="checked-label i18n"
                            data-i18n-name="LongTranslator"
                            data-insert-pos="afterBegin"
                        >
                            <select
                                id="long-translator"
                                class="translator-config"
                                data-affected="longTranslation"
                            ></select>
                        </label>
                    </div>
                </div>
                <div class="row">
                    <div class="column">
                    </div>
                    <div class="column">
                        <label
                            for="long-text-threshold"
                            class="checked-label i18n"
                            data-i18n-name="LongTextThreshold"
                            data-insert-pos="afterBegin"
                        >
                            <input
                                id="long-text-threshold"
                                type="number"
                                min="10"
                                max="500"
                                setting-type="HybridTranslatorConfig"
                                setting-path="HybridTranslatorConfig longTextThreshold"
                            />
                        </label>
                    </div>
                </div>

                <!-- 网页翻译功能已禁用，Edge 自带网页翻译
                <label class="setting-title i18n" data-i18n-name="DefaultPageTranslator"></label>
                <div class="row">
                    <div class="column">
                        <label
                            for="youdao-page-translator"
                            class="checked-label i18n"
                            data-i18n-name="YoudaoPageTranslate"
                        >
                            <input
                                type="radio"
                                value="YoudaoPageTranslate"
                                setting-type="radio"
                                setting-path="DefaultPageTranslator"
                                class="radio"
                                name="default-page-translator"
                                id="youdao-page-translator"
                                checked
                            />
                        </label>
                    </div>
                </div>
                -->

                <label
                    for="layout-settings"
                    class="setting-title i18n"
                    data-i18n-name="LayoutSettings"
                ></label>
                <div id="layout-settings">
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                value="resize"
                                setting-type="switch"
                                setting-path="LayoutSettings Resize"
                                class="switch"
                                id="Resize"
                            />
                            <span class="space"></span>
                            <label
                                for="Resize"
                                class="checked-label i18n"
                                data-i18n-name="ResizeSetting"
                            ></label>
                        </div>
                        <div class="column">
                            <input
                                type="checkbox"
                                value="rtl"
                                setting-type="switch"
                                setting-path="LayoutSettings RTL"
                                class="switch"
                                id="RTL"
                            />
                            <span class="space"></span>
                            <label
                                for="RTL"
                                class="checked-label i18n"
                                data-i18n-name="RTLSetting"
                            ></label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                value="FoldLongContent"
                                setting-type="switch"
                                setting-path="LayoutSettings FoldLongContent"
                                class="switch"
                                id="FoldLongContent"
                            />
                            <span class="space"></span>
                            <label
                                for="FoldLongContent"
                                class="checked-label i18n"
                                data-i18n-name="FoldLongContentSetting"
                            ></label>
                        </div>
                        <div class="column">
                            <label
                                for="select-translate-position"
                                class="checked-label i18n"
                                data-i18n-name="SelectTranslatePosition"
                                data-insert-pos="afterBegin"
                            >
                                <select
                                    setting-type="select"
                                    id="select-translate-position"
                                    value="SelectTranslatePosition"
                                    setting-path="LayoutSettings SelectTranslatePosition"
                                >
                                    <option
                                        value="TopRight"
                                        data-i18n-name="TopRight"
                                        class="i18n"
                                    ></option>
                                    <option
                                        value="TopLeft"
                                        data-i18n-name="TopLeft"
                                        class="i18n"
                                    ></option>
                                    <option
                                        value="BottomRight"
                                        data-i18n-name="BottomRight"
                                        class="i18n"
                                        selected
                                    ></option>
                                    <option
                                        value="BottomLeft"
                                        data-i18n-name="BottomLeft"
                                        class="i18n"
                                    ></option>
                                </select>
                            </label>
                        </div>
                    </div>
                </div>

                <label
                    for="other-settings"
                    class="setting-title i18n"
                    data-i18n-name="OtherSettings"
                ></label>
                <div id="other-settings">
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                setting-type="switch"
                                setting-path="OtherSettings SelectTranslate"
                                class="switch"
                                id="select-translate"
                            />
                            <span class="space"></span>
                            <label
                                for="select-translate"
                                class="checked-label i18n"
                                data-i18n-name="SelectTranslate"
                            ></label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                setting-type="switch"
                                setting-path="OtherSettings UsePDFjs"
                                class="switch"
                                id="use-pdf-js"
                            />
                            <span class="space"></span>
                            <label
                                for="use-pdf-js"
                                class="checked-label i18n"
                                data-i18n-name="UsePDFjs"
                            ></label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                setting-type="switch"
                                setting-path="OtherSettings TranslateAfterSelect"
                                class="switch"
                                id="translate-after-select"
                            />
                            <span class="space"></span>
                            <label
                                for="translate-after-select"
                                class="checked-label i18n"
                                data-i18n-name="TranslateAfterSelect"
                            ></label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                setting-type="switch"
                                setting-path="OtherSettings TranslateAfterDblClick"
                                class="switch"
                                id="translate-after-dbl-click"
                            />
                            <span class="space"></span>
                            <label
                                for="translate-after-dbl-click"
                                class="checked-label i18n"
                                data-i18n-name="TranslateAfterDblClick"
                            ></label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                setting-type="switch"
                                setting-path="OtherSettings CancelTextSelection"
                                class="switch"
                                id="cancel-text-selection"
                            />
                            <span class="space"></span>
                            <label
                                for="cancel-text-selection"
                                class="checked-label i18n"
                                data-i18n-name="CancelTextSelection"
                            ></label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                setting-type="switch"
                                setting-path="OtherSettings UseGoogleAnalytics"
                                class="switch"
                                id="google-analytics"
                            />
                            <span class="space"></span>
                            <label
                                for="google-analytics"
                                class="checked-label i18n"
                                data-i18n-name="UseGoogleAnalytics"
                            ></label>
                            <span class="space"></span>
                            (<a
                                id="PrivacyPolicyLink"
                                target="blank"
                                class="i18n"
                                data-i18n-name="PrivacyPolicy"
                            ></a
                            >)
                        </div>
                    </div>
                </div>
            </div>
            <label class="setting-title i18n" data-i18n-name="ApiKeyConfig"></label>
            <div class="api-config-section">
                <div class="api-config-row">
                    <label class="api-config-label i18n" for="tencent-secret-id" data-i18n-name="TencentSecretId"></label>
                    <input
                        type="text"
                        setting-type="text"
                        setting-path="TencentTranslateConfig secretId"
                        class="api-key-input"
                        id="tencent-secret-id"
                        placeholder="请输入腾讯云 SecretId"
                        spellcheck="false"
                    />
                </div>
                <div class="api-config-row">
                    <label class="api-config-label i18n" for="tencent-secret-key" data-i18n-name="TencentSecretKey"></label>
                    <input
                        type="password"
                        setting-type="text"
                        setting-path="TencentTranslateConfig secretKey"
                        class="api-key-input"
                        id="tencent-secret-key"
                        placeholder="请输入腾讯云 SecretKey"
                        spellcheck="false"
                    />
                </div>
                <div class="api-config-hint">
                    <span class="api-config-link">获取密钥：</span>
                    <a href="https://console.cloud.tencent.com/cam/capi" target="_blank">腾讯云 API 密钥</a>
                </div>

                <div class="api-config-divider"></div>

                <div class="api-config-row">
                    <label class="api-config-label i18n" for="baidu-app-id" data-i18n-name="BaiduAppId"></label>
                    <input
                        type="text"
                        setting-type="text"
                        setting-path="BaiduTranslateConfig appId"
                        class="api-key-input"
                        id="baidu-app-id"
                        placeholder="请输入百度翻译 APP ID"
                        spellcheck="false"
                    />
                </div>
                <div class="api-config-row">
                    <label class="api-config-label i18n" for="baidu-app-key" data-i18n-name="BaiduAppKey"></label>
                    <input
                        type="password"
                        setting-type="text"
                        setting-path="BaiduTranslateConfig appKey"
                        class="api-key-input"
                        id="baidu-app-key"
                        placeholder="请输入百度翻译密钥"
                        spellcheck="false"
                    />
                </div>
                <div class="api-config-hint">
                    <span class="api-config-link">获取密钥：</span>
                    <a href="https://api.fanyi.baidu.com/" target="_blank">百度翻译开放平台</a>
                </div>

                <div class="api-config-divider"></div>

                <div class="api-config-row">
                    <label class="api-config-label" for="youdao-fanyi-app-key">有道翻译 AppKey</label>
                    <input
                        type="text"
                        setting-type="text"
                        setting-path="YoudaoTranslateConfig appKey"
                        class="api-key-input"
                        id="youdao-fanyi-app-key"
                        placeholder="请输入有道智云 AppKey"
                        spellcheck="false"
                    />
                </div>
                <div class="api-config-row">
                    <label class="api-config-label" for="youdao-fanyi-app-secret">有道翻译 AppSecret</label>
                    <input
                        type="password"
                        setting-type="text"
                        setting-path="YoudaoTranslateConfig appSecret"
                        class="api-key-input"
                        id="youdao-fanyi-app-secret"
                        placeholder="请输入有道智云 AppSecret"
                        spellcheck="false"
                    />
                </div>
                <div class="api-config-hint">
                    <span class="api-config-link">获取密钥：</span>
                    <a href="https://ai.youdao.com/" target="_blank">有道智云开放平台</a>
                </div>

                <div class="api-config-divider"></div>

                <div class="api-config-row">
                    <label class="api-config-label i18n" for="google-proxy-url" data-i18n-name="GoogleProxyUrl"></label>
                    <input
                        type="text"
                        setting-type="text"
                        setting-path="GoogleTranslateConfig proxyUrl"
                        class="api-key-input"
                        id="google-proxy-url"
                        placeholder="可选：填入代理 URL 以启用 Google 翻译"
                        spellcheck="false"
                    />
                </div>
                <div class="api-config-hint">
                    <span>不填则跳过 Google，不影响其他翻译源</span>
                </div>

                <div class="api-config-divider"></div>

                <div id="ai-configs-section">
                    <div class="api-config-hint" style="margin-bottom:8px">
                        <span>支持 DeepSeek、Groq、OpenAI、SiliconFlow 等 OpenAI 兼容 API</span>
                        <span class="api-config-link" style="margin-left:10px">免费注册：</span>
                        <a href="https://platform.deepseek.com/" target="_blank">DeepSeek</a>
                    </div>
                    <div id="ai-configs-container"></div>
                    <button id="add-ai-config-btn" class="api-add-btn">+ 添加模型</button>
                </div>

                <div class="api-config-divider"></div>
                <div class="api-config-actions">
                    <button id="export-keys-btn" class="api-btn">导出配置</button>
                    <button id="import-keys-btn" class="api-btn">导入配置</button>
                    <input type="file" id="import-keys-file" accept=".json" style="display:none" />
                </div>
            </div>

            <footer>
                <span class="space"></span>
                <a href="https://github.com/EdgeTranslate/EdgeTranslate" target="blank">
                    Edge Translate
                </a>
                <span class="space"></span>
                Powered by
                <a href="https://translate.google.com" target="blank">Google Translate</a>
                <span class="space"></span>
                <a href="https://fanyi.youdao.com/" target="blank">有道翻译</a>
                <span class="space"></span>
                <a href="https://fanyi.baidu.com/" target="blank">百度翻译</a>
                <span class="space"></span>
                <a href="https://translate.tencent.com/" target="blank">腾讯翻译</a>
            </footer>
        </div>
    </body>

    <script src="./options.js"></script>
</html>
